<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/eventbooster/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vanilla App Template</title>
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/modern-normalize/3.0.1/modern-normalize.min.css"
    integrity="sha512-q6WgHqiHlKyOqslT/lgBgodhd03Wp4BEqKeW6nNtlOY4quzyG3VoQKFrieaCeSnuVseNKRGpGeDU3qPmabCANg=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    
    <script type="module" crossorigin src="/eventbooster/assets/index-bd8c8ccb.js"></script>
    <link rel="stylesheet" href="/eventbooster/assets/index-a4c27f5d.css">
  </head>
  <body>

    <header class="header">
    <div class="container">
        <img src="../img/new-logo.png" alt="logo" class="header__img">
        <h1 class="header__text">FIND BEST EVENTS AROUND THE WORLD</h1>
        <form class="header__form">
            <input type="text" class="form__search" placeholder="Start searching">
            <svg class="form__svgsearch">
                <use href="/eventbooster/assets/search-icon-d6f90a0e.svg"></use>
            </svg>
            <div class="form__choose">
                <p class="choose__text">Choose country</p>
                <ul class="choose__list">
                    <li class="choose__item">
                        <p class="choose__desc">United States of America</p>
                    </li>
                    <li class="choose__item">
                        <p class="choose__desc">Great Britian</p>
                    </li>
                    <li class="choose__item">
                        <p class="choose__desc">Canada</p>
                    </li>
                </ul>
            </div>
            <svg class="form__svgchoose">
                <use href="/eventbooster/assets/polygon-choose-92deb850.svg"></use>
            </svg>
        </form>
    </div>
</header>
    <section class="hero">
    <div class="container">
        <div class="hero__box">
            <div class="lds-facebook">
                <div class="load__point"></div>
                <div class="load__point"></div>
                <div class="load__point"></div>
            </div>
        </div>
        <ul class="hero__listcards">
        </ul>
        <!-- <div class="pagination">
            <button id="prev" class="pagination__button">Prev</button>
            <p id="page-info" class="pagination__text"></p>
            <button id="next" class="pagination__button">Next</button>
        </div> -->
        <div class="pagination__container">
            <div class="pagination:number arrow">
                <svg width="18" height="18">
                    <use xlink:href="#left" />
                </svg>
                <span class="arrow:text">Previous</span>
            </div>
            <div class="pagination:number pagination:active">
                1
            </div>
            <div class="pagination:number">
                2
            </div>
            <div class="pagination:number">
                3
            </div>
            <div class="pagination:number">
                4
            </div>
            <div class="pagination:number">
                540
            </div>
            <div class="pagination:number arrow">
                <svg width="18" height="18">
                    <use xlink:href="#right" />
                </svg>
            </div>
        </div>
        <svg class="hide">
            <symbol id="left" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
            </symbol>
            <symbol id="right" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
            </symbol>
        </svg>
    </div>
</section>
    
    
    
  </body>
</html>
