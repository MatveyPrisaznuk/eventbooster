<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/eventbooster/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vanilla App Template</title>
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/modern-normalize/3.0.1/modern-normalize.min.css"
    integrity="sha512-q6WgHqiHlKyOqslT/lgBgodhd03Wp4BEqKeW6nNtlOY4quzyG3VoQKFrieaCeSnuVseNKRGpGeDU3qPmabCANg=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    
    <script type="module" crossorigin src="/eventbooster/assets/index-1f31ccdd.js"></script>
    <link rel="stylesheet" href="/eventbooster/assets/index-eaddb77a.css">
  </head>
  <body>

    <header class="header">
    <div class="container">
        <img src="/eventbooster/assets/new-logo-f6a5eebc.png" alt="logo" class="header__img">
        <h1 class="header__text">FIND BEST EVENTS AROUND THE WORLD</h1>
        <form class="header__form">
            <input type="text" class="form__search" placeholder="Start searching">
            <!-- <svg class="form__svgsearch">
                <use href="./img/search-icon.svg"></use>
            </svg> -->
            <div class="form__choose">
                <p class="choose__text">Choose country</p>
                <ul class="choose__list">
                    <li class="choose__item" data-country="">
                        <p class="choose__desc">All world</p>
                    </li>
                    <li class="choose__item" data-country="US">
                        <p class="choose__desc">United States</p>
                    </li>
                    <li class="choose__item" data-country="UK">
                        <p class="choose__desc">Great Britian</p>
                    </li>
                    <li class="choose__item" data-country="CA">
                        <p class="choose__desc">Canada</p>
                    </li>
                </ul>
            </div>
            <!-- <svg class="form__svgchoose">
                <use href="./img/polygon-choose.svg"></use>
            </svg> -->
        </form>
    </div>
</header>
    <section class="hero">
    <div class="container">
        <div class="hero__box">
            <div class="lds-facebook">
                <div class="load__point"></div>
                <div class="load__point"></div>
                <div class="load__point"></div>
            </div>
        </div>
        <ul class="hero__listcards">
        </ul>
        <div class="pagination__container">
        </div>
    </div>
    <svg class="hide">
        <symbol id="left" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
        </symbol>
        <symbol id="right" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
        </symbol>
    </svg>
    </div>
</section>
    <footer class="footer">
    <div class="container">
        <h2 class="footer-text">© 2021 | All Rights Reserved | Developed with <span class="heart">❤</span>
            by GoIT Students</h2>
    </div>
</footer>
    <div class="backdrop backdrop-hidden" data-modal>
  <div class="modal">
    <button class="modal-close-btn" data-close>✕</button>
    <div class="modal__wrap"></div>
  </div>
</div>
    
  </body>
</html>
